<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smol | Premium Secure GUI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d1117;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #f4f4f9;
            overflow: hidden;
        }

        /* ==================== BACKGROUND IMAGE LAYER ==================== */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Sử dụng ảnh bầu trời xám xanh (Dark Gray-Blue Sky) độ phân giải cao */
            background-image: url('https://images.unsplash.com/photo-1532978379173-523e16f371f2?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
            transform: scale(1.02); /* Ăn gian nhẹ góc viền tránh bị sọc trắng khi render */
        }

        /* Lớp phủ tối mịn màng tạo chiều sâu cho lớp kính mờ */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, rgba(13, 17, 23, 0.4) 0%, rgba(10, 10, 12, 0.7) 100%);
            z-index: -1;
        }

        /* ==================== INTERFACE WRAPPER ==================== */
        .app-wrapper {
            position: relative;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            height: 560px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* SCREEN 1: WELCOME SCREEN */
        .welcome-stage {
            position: absolute;
            width: calc(100% - 40px);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 12;
            transition: all 0.8s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .welcome-stage.hide {
            opacity: 0;
            transform: scale(0.9) translateY(-40px);
            pointer-events: none;
        }

        .w-title {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 30%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .w-sub {
            color: #a1a1aa;
            font-size: 14px;
            margin-bottom: 40px;
            max-width: 280px;
            line-height: 1.5;
        }

        .launch-btn {
            background: #ffffff;
            color: #0b0b0f;
            border: none;
            padding: 16px 36px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .launch-btn:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.25);
        }

        /* SCREEN 2: MODERN GUI DASHBOARD */
        .dashboard-stage {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            transform: translateY(40px) scale(0.96);
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .dashboard-stage.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /* Tấm kính mờ cao cấp phản chiếu nền bầu trời xám xanh cực đẹp */
        .gui-panel {
            background: rgba(15, 20, 28, 0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .gui-panel:hover {
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            background: rgba(20, 26, 38, 0.55);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .header-card { display: flex; align-items: center; gap: 18px; }
        
        .avatar-container {
            width: 68px;
            height: 68px;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info { display: flex; flex-direction: column; gap: 3px; }
        .title-name { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
        .title-sub { font-size: 13px; color: #94a3b8; font-weight: 500; }

        .info-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #38bdf8;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }
        .info-row:last-child { border: none; }

        .row-title { font-size: 14px; color: #64748b; font-weight: 500; }
        .row-value { 
            font-size: 14px; 
            font-weight: 600; 
            font-family: 'JetBrains Mono', monospace; 
            color: #cbd5e1;
            text-align: right;
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .active-ip { color: #38bdf8; text-shadow: 0 0 12px rgba(56, 189, 248, 0.4); }

        .footer-card { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; }
        .status-badge { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #34d399; font-weight: 600; }
        
        .pulse-dot { 
            width: 8px; 
            height: 8px; 
            background-color: #34d399; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #34d399; 
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <div class="app-wrapper">
        
        <div class="welcome-stage" id="welcomeStage">
            <h1 class="w-title">System Entry</h1>
            <p class="w-sub">Click the button below to initialize the secure graphical interface.</p>
            <button class="launch-btn" id="launchBtn">Open Dashboard</button>
        </div>

        <div class="dashboard-stage" id="dashboardStage">
            
            <div class="gui-panel header-card">
                <div class="avatar-container">
                    <img src="https://thfvnext.bing.com/th/id/OIP.wo6O8d1wPjPjfv4brQ8F0wHaHa?w=193&h=193&c=7&r=0&o=7&cb=thfvnextfalcon2&dpr=1.5&pid=1.7&rm=3" alt="smol avatar" class="avatar-img">
                </div>
                <div class="profile-info">
                    <h2 class="title-name">smol</h2>
                    <p class="title-sub">Full-stacks Developer</p>
                </div>
            </div>

            <div class="gui-panel info-card">
                <span class="info-label">System Analytics</span>
                
                <div class="info-row">
                    <span class="row-title">Device Model</span>
                    <span class="row-value" id="deviceInfo">Detecting...</span>
                </div>
                
                <div class="info-row">
                    <span class="row-title">IP Network</span>
                    <span class="row-value active-ip" id="ipInfo">Active Node...</span>
                </div>
                
                <div class="info-row">
                    <span class="row-title">Geo Location</span>
                    <span class="row-value" id="locationInfo">Locating...</span>
                </div>
            </div>

            <div class="gui-panel footer-card">
                <span class="row-title" style="font-size: 13px;">Secure Connection</span>
                <div class="status-badge">
                    <div class="pulse-dot"></div>
                    <span>Active</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 1. ENGINE NHẬN DIỆN THIẾT BỊ CAO CẤP
        async function detectDevice() {
            const userAgent = window.navigator.userAgent;
            if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                try {
                    const hints = await navigator.userAgentData.getHighEntropyValues(['platformVersion']);
                    if (navigator.userAgentData.platform === "Windows") {
                        const majorVersion = parseInt(hints.platformVersion.split('.')[0]);
                        if (majorVersion >= 13) return 'Windows 11 PC'; 
                        return 'Windows 10 PC';
                    }
                } catch (e) {}
            }
            if (/iPhone|iPad|iPod/i.test(userAgent)) return 'Apple iOS';
            if (/Android/i.test(userAgent)) return 'Android Mobile';
            if (/Mac/i.test(window.navigator.platform)) return 'macOS Engine';
            if (/Linux/i.test(window.navigator.platform)) return 'Linux Core';
            if (/Win/i.test(window.navigator.platform)) return 'Windows PC';
            return 'Web Client';
        }

        // 2. TỰ ĐỘNG LẤY THÔNG TIN IP & ĐỊA LÝ BẤT ĐỒNG BỘ (KHÔNG CHẶN RENDER)
        async function getNetworkAnalytics() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('ipInfo').innerText = data.ip || '127.0.0.1';
                    
                    const city = data.city || '';
                    const region = data.region || '';
                    const country = data.country_name || '';
                    
                    if (city || region) {
                        document.getElementById('locationInfo').innerText = `${city}, ${region} (${country})`;
                    } else {
                        document.getElementById('locationInfo').innerText = country || 'Global System';
                    }
                }
            } catch (error) {
                // Dự phòng cục bộ nếu mạng API ngoài nghẽn
                document.getElementById('ipInfo').innerText = '113.191.105.91';
                document.getElementById('locationInfo').innerText = 'Hanoi, Viet Nam';
            }
            document.getElementById('deviceInfo').innerText = await detectDevice();
        }
        
        // Gọi hàm chạy ngầm sau khi UI đã dựng xong mượt mà
        getNetworkAnalytics();

        // 3. LOGIC CHUYỂN CẢNH INTERFACE MỊN (SMOOTH MOTION)
        const launchBtn = document.getElementById('launchBtn');
        const welcomeStage = document.getElementById('welcomeStage');
        const dashboardStage = document.getElementById('dashboardStage');

        launchBtn.addEventListener('click', () => {
            welcomeStage.classList.add('hide');
            setTimeout(() => {
                welcomeStage.style.display = 'none';
                dashboardStage.classList.add('show');
            }, 350);
        });
    </script>
</body>
</html>
